<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사조영웅전: 강호의 별 — 김용 무협 SRPG 데모</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
:root{
  --bg:#1b1712; --panel:#2a241b; --panel2:#332c21; --line:#4d4433;
  --gold:#d9b36c; --gold2:#f0d49a; --text:#e8ddc8; --dim:#a89878;
  --blue:#5d8fb5; --red:#c05a4a; --green:#7fae6a;
}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Serif KR','Nanum Myeongjo','Apple SD Gothic Neo','Malgun Gothic',serif;
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  background-image:radial-gradient(ellipse at 50% -20%, #2e2418 0%, #1b1712 60%);
}
#app{width:1040px;max-width:98vw;}
h1,h2,h3{font-weight:700;color:var(--gold2);letter-spacing:.06em;}
.btn{
  display:inline-block;background:linear-gradient(180deg,#4a3f2c,#332c21);
  border:1px solid var(--gold);color:var(--gold2);padding:9px 22px;border-radius:4px;
  font-size:16px;cursor:pointer;font-family:inherit;letter-spacing:.1em;transition:all .15s;
}
.btn:hover{background:linear-gradient(180deg,#5d4f37,#40372a);box-shadow:0 0 10px rgba(217,179,108,.35);}
.btn:disabled{opacity:.35;cursor:default;box-shadow:none;}
.btn.small{padding:5px 12px;font-size:13px;}
.btn.danger{border-color:var(--red);color:#f0b0a0;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;}

/* ── 타이틀 ── */
#title-screen{text-align:center;padding:20px 0;}
#title-art{border:2px solid var(--gold);border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.6);}
.title-main{font-size:44px;margin:18px 0 4px;text-shadow:0 2px 12px rgba(217,179,108,.4);}
.title-sub{color:var(--dim);font-size:15px;margin-bottom:22px;}
.title-menu .btn{margin:6px;width:220px;}
.title-note{margin-top:20px;color:#7a6c52;font-size:12px;line-height:1.7;}

/* ── 대화 ── */
#dlg-screen{position:relative;height:600px;border:2px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer;}
#dlg-bg{position:absolute;inset:0;}
.dlg-pt{position:absolute;bottom:150px;width:230px;height:230px;transition:all .25s;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
.dlg-pt.L{left:60px;} .dlg-pt.R{right:60px;transform:scaleX(-1);}
.dlg-pt.dimmed{opacity:.35;filter:grayscale(.8) brightness(.6);}
#dlg-box{
  position:absolute;left:20px;right:20px;bottom:16px;min-height:118px;
  background:rgba(20,16,10,.92);border:1px solid var(--gold);border-radius:6px;padding:14px 20px;
}
#dlg-name{color:var(--gold2);font-size:17px;font-weight:700;margin-bottom:6px;}
#dlg-name.enemy{color:#e09080;}
#dlg-text{font-size:16.5px;line-height:1.75;}
#dlg-hint{position:absolute;right:16px;bottom:8px;color:var(--dim);font-size:12px;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:.9}50%{opacity:.2}}
.dlg-title-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,8,5,.85);}
.dlg-title-card h2{font-size:36px;margin-bottom:10px;}
.dlg-title-card p{color:var(--dim);font-size:16px;}

/* ── 전투 ── */
#battle{display:flex;gap:12px;align-items:flex-start;}
#mapwrap{position:relative;flex:0 0 auto;border:2px solid var(--line);border-radius:6px;overflow:hidden;background:#000;}
#mapsvg{display:block;}
#fx{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.dmgpop{
  position:absolute;font-size:22px;font-weight:900;color:#fff;
  text-shadow:0 0 6px #c02020,0 2px 2px #000;animation:floatup .9s ease-out forwards;
  transform:translate(-50%,-50%);font-family:'Malgun Gothic',sans-serif;
}
.dmgpop.heal{text-shadow:0 0 6px #20a040,0 2px 2px #000;}
.dmgpop.miss{color:#ccc;text-shadow:0 2px 2px #000;font-size:18px;}
.dmgpop.crit{font-size:30px;color:#ffd94a;}
.dmgpop.label{font-size:14px;color:var(--gold2);text-shadow:0 1px 2px #000;}
@keyframes floatup{0%{opacity:0;margin-top:6px}15%{opacity:1}80%{opacity:1}100%{opacity:0;margin-top:-30px}}
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-2px)}80%{transform:translate(3px,2px)}}
#banner{
  position:absolute;left:0;right:0;top:42%;text-align:center;font-size:34px;font-weight:900;color:var(--gold2);
  background:linear-gradient(90deg,transparent,rgba(20,15,8,.9) 25%,rgba(20,15,8,.9) 75%,transparent);
  padding:14px 0;letter-spacing:.3em;pointer-events:none;opacity:0;transition:opacity .3s;text-shadow:0 2px 8px #000;
}
#banner.show{opacity:1;}
#banner.enemy{color:#e09080;}
#side{flex:1;display:flex;flex-direction:column;gap:10px;min-width:250px;}
#side .panel{padding:10px 12px;font-size:13.5px;}
#chinfo .ch-t{font-size:16px;color:var(--gold2);font-weight:700;}
#chinfo .row{display:flex;justify-content:space-between;margin-top:4px;color:var(--dim);}
#chinfo .row b{color:var(--text);}
#unitcard{min-height:120px;}
.uc-head{display:flex;gap:10px;align-items:center;}
.uc-pt{width:56px;height:56px;border-radius:50%;border:2px solid var(--gold);flex:0 0 auto;overflow:hidden;background:#4a4032;}
.uc-pt.enemy{border-color:var(--red);}
.uc-name{font-size:16px;font-weight:700;color:var(--gold2);}
.uc-sub{font-size:12px;color:var(--dim);}
.bar{height:9px;background:#191510;border-radius:5px;margin-top:3px;overflow:hidden;border:1px solid #000;}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .3s;}
.bar.hp>i{background:linear-gradient(180deg,#8fce6a,#5e9e42);}
.bar.hp.low>i{background:linear-gradient(180deg,#e0805a,#c05a3a);}
.bar.ki>i{background:linear-gradient(180deg,#6ab0ce,#4276a0);}
.uc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 8px;margin-top:8px;font-size:12.5px;color:var(--dim);}
.uc-stats b{color:var(--text);}
.uc-skill{margin-top:7px;font-size:12.5px;color:#c8b088;}
.typebadge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700;margin-left:6px;vertical-align:1px;}
.type-외{background:#7a3d2e;color:#ffd0c0;} .type-경{background:#2e6b4f;color:#c0ffe0;} .type-내{background:#3d4e7a;color:#c0d8ff;}
#terrinfo{color:var(--dim);}
#terrinfo b{color:var(--text);}
#sidebtns{display:flex;gap:8px;flex-wrap:wrap;}
#log{max-height:110px;overflow-y:auto;font-size:12px;color:var(--dim);line-height:1.55;}
#log .imp{color:var(--gold2);}

/* 액션 메뉴 */
#amenu{position:absolute;z-index:30;display:flex;flex-direction:column;gap:4px;background:rgba(24,19,12,.96);border:1px solid var(--gold);border-radius:6px;padding:6px;}
#amenu .btn{width:150px;text-align:left;font-size:14px;padding:6px 12px;}

/* 모달 */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal{background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:20px 24px;max-width:560px;max-height:86vh;overflow-y:auto;}
.modal h3{margin-bottom:12px;font-size:20px;}
.fc-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:4px 14px;text-align:center;font-size:14px;margin:10px 0;}
.fc-grid .hd{color:var(--gold2);font-weight:700;font-size:15px;}
.fc-grid .lbl{color:var(--dim);}
.fc-grid .val{font-weight:700;font-size:16px;}
.modal .btnrow{text-align:center;margin-top:14px;}
.modal .btnrow .btn{margin:0 6px;}
.helptable{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0;}
.helptable td,.helptable th{border:1px solid var(--line);padding:4px 8px;text-align:center;}
.helptable th{background:var(--panel2);color:var(--gold2);}
.lvlup-line{font-size:15px;margin:4px 0;color:var(--text);}
.lvlup-line b{color:var(--gold2);}

/* 결과 화면 */
.result-screen{text-align:center;padding:60px 0;}
.result-screen h2{font-size:42px;margin-bottom:16px;}
.result-screen p{color:var(--dim);font-size:16px;margin-bottom:26px;line-height:1.8;}

svg text{font-family:'Malgun Gothic',sans-serif;}
::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>

/* ============================================================

   ============================================================ */

function shade(hex, f){ // f<1 어둡게, f>1 밝게
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.min(255,Math.round(r*f)); g=Math.min(255,Math.round(g*f)); b=Math.min(255,Math.round(b*f));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* 초상화 defs 등록 (1회) */
function buildPortraitDefs(){
  let defs='';
  for(const id in CHARS){
    defs+=`<g id="pt-${id}">${portraitInner(CHARS[id].pt)}</g>`;
  }
  const holder=document.createElement('div');
  holder.innerHTML=`<svg width="0" height="0" style="position:absolute"><defs>${defs}</defs></svg>`;
  document.body.appendChild(holder.firstChild);
}

function tileSVG(t, x, y){
  const px=x*TS, py=y*TS, T=TILE[t];
  const alt=((x+y)%2===0)?1:0.94;
  let s=`<rect x="${px}" y="${py}" width="${TS}" height="${TS}" fill="${shade(T.color,alt)}"/>`;
  const cx=px+TS/2, cy=py+TS/2;
  if(t==='f'){
    s+=`<ellipse cx="${cx}" cy="${cy+6}" rx="15" ry="5" fill="rgba(0,0,0,.15)"/>`;
    s+=`<path d="M${cx},${py+7} L${cx+13},${cy+8} L${cx-13},${cy+8} Z" fill="#3f6b35"/>`;
    s+=`<path d="M${cx},${py+13} L${cx+11},${cy+12} L${cx-11},${cy+12} Z" fill="#4c7d40"/>`;
    s+=`<rect x="${cx-2.5}" y="${cy+10}" width="5" height="8" fill="#6b4a2e"/>`;
  }else if(t==='m'){
    s+=`<path d="M${px+4},${py+TS-6} L${cx-4},${py+10} L${cx+8},${py+TS-6} Z" fill="#7a7264"/>`;
    s+=`<path d="M${cx-4},${py+10} L${cx+2},${py+20} L${cx-9},${py+24} Z" fill="#c8c2b4"/>`;
    s+=`<path d="M${cx+2},${py+TS-6} L${cx+16},${py+22} L${px+TS-3},${py+TS-6} Z" fill="#8d8574"/>`;
  }else if(t==='w'){
    s+=`<path d="M${px+8},${cy-6} q6,-5 12,0 q6,5 12,0" stroke="#8fc0dd" stroke-width="2" fill="none" opacity=".7"/>`;
    s+=`<path d="M${px+14},${cy+10} q6,-5 12,0 q6,5 12,0" stroke="#8fc0dd" stroke-width="2" fill="none" opacity=".5"/>`;
  }else if(t==='h'){
    s+=`<rect x="${px+10}" y="${cy}" width="${TS-20}" height="${TS/2-6}" fill="#8a6b4e"/>`;
    s+=`<path d="M${px+5},${cy+2} L${cx},${py+8} L${px+TS-5},${cy+2} Z" fill="#6b4a3a"/>`;
    s+=`<path d="M${px+5},${cy+2} L${cx},${py+8} L${cx},${cy+2} Z" fill="#7d5846"/>`;
    s+=`<rect x="${cx-4}" y="${cy+8}" width="8" height="12" fill="#463424"/>`;
  }else if(t==='#'){
    s+=`<rect x="${px}" y="${py}" width="${TS}" height="${TS}" fill="#5a5148"/>`;
    s+=`<path d="M${px},${py+TS/3} h${TS} M${px},${py+TS*2/3} h${TS} M${cx},${py} v${TS/3} M${px+TS/4},${py+TS/3} v${TS/3} M${px+TS*3/4},${py+TS/3} v${TS/3} M${cx},${py+TS*2/3} v${TS/3}" stroke="#4a4239" stroke-width="1.6"/>`;
  }else if(t==='r'){
    s+=`<circle cx="${px+12}" cy="${py+14}" r="1.6" fill="#b09c74"/><circle cx="${px+34}" cy="${py+36}" r="1.6" fill="#b09c74"/>`;
  }else if(t==='.'){
    if((x*7+y*13)%5===0) s+=`<path d="M${px+12},${py+38} q2,-6 4,0 M${px+34},${py+16} q2,-6 4,0" stroke="#6f9457" stroke-width="1.6" fill="none"/>`;
  }
  s+=`<rect x="${px}" y="${py}" width="${TS}" height="${TS}" fill="none" stroke="rgba(0,0,0,.12)"/>`;
  return s;
}

/* ── 유닛 토큰 ── */
function unitSVG(u){
  const px=u.x*TS+TS/2, py=u.y*TS+TS/2;
  const ring = u.team==='P' ? '#4a90c8' : '#c8564a';
  const acted = (u.team==='P'&&u.acted) ? 'opacity:.45;filter:grayscale(.9);' : '';
  const r=TS/2-5;
  const hpw = TS-16, hpr = Math.max(0, u.hp/u.maxhp);
  let s=`<g class="unit" data-ux="${u.x}" data-uy="${u.y}" style="${acted}cursor:pointer;">`;
  s+=`<ellipse cx="${px}" cy="${py+r-2}" rx="${r*0.8}" ry="4" fill="rgba(0,0,0,.3)"/>`;
  s+=`<circle cx="${px}" cy="${py-2}" r="${r}" fill="#3a3226" stroke="${ring}" stroke-width="3"/>`;
  s+=`<clipPath id="clip-${u.uid}"><circle cx="${px}" cy="${py-2}" r="${r-2}"/></clipPath>`;
  const sc=(r-2)*2/100, ox=px-(r-2), oy=py-2-(r-2);
  s+=`<g clip-path="url(#clip-${u.uid})"><g transform="translate(${ox},${oy}) scale(${sc})"><rect width="100" height="100" fill="#4a4032"/><use href="#pt-${u.cid}"/></g></g>`;
  if(u.boss) s+=`<path d="M${px-7},${py-r-7} L${px-4},${py-r-2} L${px},${py-r-8} L${px+4},${py-r-2} L${px+7},${py-r-7} L${px+6},${py-r-1} L${px-6},${py-r-1} Z" fill="#ffd94a" stroke="#8a6a10" stroke-width=".8"/>`;
  s+=`<rect x="${px-hpw/2}" y="${py+r-8}" width="${hpw}" height="5" rx="2.5" fill="#141008" stroke="#000" stroke-width=".6"/>`;
  s+=`<rect x="${px-hpw/2+0.8}" y="${py+r-7.2}" width="${(hpw-1.6)*hpr}" height="3.4" rx="1.7" fill="${hpr>0.4?'#7ec860':'#e07a4a'}"/>`;
  const tb={'외':'#a05038','경':'#3e8a62','내':'#4a6aa0'}[u.type];
  s+=`<circle cx="${px+r-3}" cy="${py-r+5}" r="7" fill="${tb}" stroke="#141008" stroke-width="1"/>`;
  s+=`<text x="${px+r-3}" y="${py-r+8.5}" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">${u.type}</text>`;
  s+=`</g>`;
  return s;
}

function statObj(base){
  return {hp:base[0],str:base[1],int:base[2],def:base[3],res:base[4],spd:base[5],skl:base[6],mov:base[7],ki:base[8]};
}
function initRosterChar(cid){
  if(G.roster[cid]) return;
  const c=CHARS[cid];

  G.party.push(cid);
}

function moveRange(u){
  const res=new Map(); res.set(u.x+','+u.y,0);
  const pq=[[0,u.x,u.y]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [c,x,y]=pq.shift();
    if(c>(res.get(x+','+y)??Infinity)) continue;
    for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+d[0], ny=y+d[1];
      if(!inb(nx,ny)) continue;
      let cost=TILE[tileChar(nx,ny)].cost;
      if(cost>=99) continue;
      if(u.type==='경'&&cost>1) cost-=1; /* 경공 특성: 험지 이동비용 -1 */
      const occ=unitAt(nx,ny);
      if(occ && occ.team!==u.team) continue;
      const nc=c+cost;
      if(nc>u.stats.mov) continue;
      if(nc<(res.get(nx+','+ny)??Infinity)){ res.set(nx+','+ny,nc); pq.push([nc,nx,ny]); }
    }
  }
  return res;
}
function stoppable(u,x,y){ const o=unitAt(x,y); return !o || o===u; }

/* ── 전투 계산 ── */
function calcStrike(a,d,skillId){
  const sk=skillId?SKILLS[skillId]:null;
  const tri=triangle(a.type,d.type);
  const atk=a.type==='내'?a.stats.int:a.stats.str;
  const mit=a.type==='내'?d.stats.res:d.stats.def;
  const dT=TILE[tileChar(d.x,d.y)];
  let dmg=Math.max(0, Math.round(atk*(sk&&sk.mult?sk.mult:1)) + tri*2 - mit - dT.def);
  let hit=Math.max(10, Math.min(100, 82 + a.stats.skl*2 + tri*10 + (sk&&sk.hit?sk.hit:0) - d.stats.spd*2 - dT.avoid));
  let crit=Math.max(0, 4 + a.stats.skl - d.stats.skl);
  const dbl=!sk && (a.stats.spd>=d.stats.spd+4);
  return {dmg,hit,crit,dbl,tri};
}
function canCounter(d,a){ return d.alive && d.range.includes(dist(a,d)); }

/* ── 연출 ── */
function fx(x,y,txt,cls){
  const layer=document.getElementById('fx'); if(!layer) return;
  const el=document.createElement('div');
  el.className='dmgpop '+(cls||'');
  el.style.left=(x*TS+TS/2)+'px'; el.style.top=(y*TS+2)+'px';
  el.textContent=txt;
  layer.appendChild(el);
  setTimeout(()=>el.remove(),950);
}
async function banner(txt, enemy){
  const b=document.getElementById('banner'); if(!b) return;
  b.textContent=txt; b.className='show'+(enemy?' enemy':'');
  await sleep(950); b.className='';
}
function log(msg,imp){
  if(!B) return;
  B.log.unshift({msg,imp});
  if(B.log.length>40) B.log.pop();
  const el=document.getElementById('log');
  if(el) el.innerHTML=B.log.map(l=>`<div class="${l.imp?'imp':''}">${l.msg}</div>`).join('');
}

/* ── 경험치/레벨 ── */
function grantExp(u, amt){
  if(u.team!=='P'||!u.alive) return;
  u.exp+=amt;
  while(u.exp>=100){
    u.exp-=100; u.lvl++;
    const ups=rollLevel(u);
    fx(u.x,u.y,'LEVEL UP!','label');
    log(`<b>레벨 업!</b> ${u.name} Lv.${u.lvl} — ${ups.join('·')} 상승`,true);
  }
}
function rollLevel(u){
  const names=['hp','str','int','def','res','spd','skl'];
  const kor={hp:'HP',str:'힘',int:'내공',def:'방어',res:'정신',spd:'속도',skl:'기술'};
  const g=CHARS[u.cid].grow, ups=[];
  names.forEach((n,i)=>{
    if(Math.random()*100 < g[i]){
      u.stats[n]++; ups.push(kor[n]);
      if(n==='hp'){u.maxhp++;u.hp++;}
    }
  });
  if(!ups.length){ u.stats.hp++; u.maxhp++; u.hp++; ups.push('HP'); }
  u.stats.ki++; u.maxki++;
  return ups;
}

/* ── 타격 1회 ── */
async function strike(a,d,skillId){
  const c=calcStrike(a,d,skillId);
  const sk=skillId?SKILLS[skillId]:null;
  if(sk){ a.ki-=sk.cost; fx(a.x,a.y,sk.name,'label'); await sleep(420); }
  const roll=Math.random()*100;
  document.getElementById('mapwrap').classList.add('shake');
  setTimeout(()=>{const m=document.getElementById('mapwrap'); if(m) m.classList.remove('shake');},380);
  if(roll<c.hit){
    let dmg=c.dmg;
    const isCrit=Math.random()*100<c.crit;
    if(isCrit) dmg=Math.round(dmg*1.6);
    d.hp=Math.max(0,d.hp-dmg);
    fx(d.x,d.y,dmg,isCrit?'crit':'');
    if(isCrit) log(`${a.name}의 <b>필살!</b> ${d.name}에게 ${dmg} 피해`);
    else log(`${a.name} → ${d.name} ${dmg} 피해`);
    grantExp(a, 8 + (sk?2:0));
    if(d.hp<=0){
      d.alive=false;
      fx(d.x,d.y,'격파!','label');
      if(d.team==='E'){
        grantExp(a, 30 + Math.max(0,(d.lvl-a.lvl))*4 + (d.boss?40:0));
        log(`<b>${d.name} 격파!</b>`,true);
      }else{
        log(`<b>${d.name}이(가) 부상으로 이탈했다…</b>`,true);
      }
    }
  }else{
    fx(d.x,d.y,'회피!','miss');
    log(`${a.name}의 공격, ${d.name}이(가) 회피`);
  }
  renderBattle(true);
  await sleep(520);
}

/* ── 교전(공격+반격+추격) ── */
async function combat(a,d,skillId){
  B.busy=true;
  const pre=calcStrike(a,d,skillId);
  await strike(a,d,skillId);
  if(checkEnd()) return;
  if(d.alive && canCounter(d,a)){
    await strike(d,a,null);
    if(checkEnd()) return;
  }
  if(a.alive && d.alive && pre.dbl){
    await strike(a,d,null);
    if(checkEnd()) return;
  }
  if(a.alive && d.alive && canCounter(d,a) && calcStrike(d,a,null).dbl){
    await strike(d,a,null);
    if(checkEnd()) return;
  }
  B.busy=false;
}

/* ── 치료 ── */
async function healAction(a,t){
  B.busy=true;
  const sk=SKILLS[a.skills[0]];
  a.ki-=sk.cost;
  const amt=a.stats.int+sk.healPow;
  t.hp=Math.min(t.maxhp,t.hp+amt);
  fx(a.x,a.y,sk.name,'label');
  await sleep(380);
  fx(t.x,t.y,'+'+amt,'heal');
  log(`${a.name}의 ${sk.name} — ${t.name} ${amt} 회복`);
  grantExp(a,14);
  renderBattle(true);
  await sleep(450);
  B.busy=false;
}

/* ── 승패 판정 ── */
function checkEnd(){
  if(B.over) return true;
  const ch=CHAPTERS[G.chapterIdx];
  const leaderDown=B.units.some(u=>u.leader&&!u.alive);
  if(leaderDown||players().length===0){
    B.over=true; B.busy=true;
    setTimeout(()=>showDefeat(),800);
    return true;
  }
  let win=false;
  if(ch.win.type==='rout') win = foes().length===0;
  else win = !B.units.some(u=>u.team==='E'&&u.cid===ch.win.boss&&u.alive);
  if(win){
    B.over=true; B.busy=true;
    setTimeout(()=>showVictory(),800);
    return true;
  }
  return false;
}

/* ── 플레이어 조작 ── */
function clearSel(){
  if(B.sel && B.orig && !B.sel.acted){ B.sel.x=B.orig.x; B.sel.y=B.orig.y; }
  B.sel=null; B.orig=null; B.mode='idle'; B.mr=null; B.inspect=null;
  hideMenu(); renderBattle();
}
function selectUnit(u){
  B.sel=u; B.orig={x:u.x,y:u.y}; B.mode='move'; B.mr=moveRange(u); B.inspect=null;
  renderBattle();
}
function inspectEnemy(u){
  if(B.inspect===u){ B.inspect=null; B.mr=null; }
  else { B.inspect=u; B.mr=moveRange(u); B.sel=null; B.mode='idle'; }
  renderBattle();
}
function attackTiles(u,mr){
  const set=new Set();
  for(const k of mr.keys()){
    const [x,y]=k.split(',').map(Number);
    if(!stoppable(u,x,y)) continue;
    for(const r of u.range){
      for(let dx=-r;dx<=r;dx++){
        const dy=r-Math.abs(dx);
        for(const yy of (dy===0?[y]:[y-dy,y+dy])){
          const xx=x+dx;
          if(inb(xx,yy)) set.add(xx+','+yy);
        }
      }
    }
  }
  return set;
}
function pickAttackPos(u,target,mr){
  let best=null;
  for(const k of mr.keys()){
    const [x,y]=k.split(',').map(Number);
    if(!stoppable(u,x,y)) continue;
    const dd=Math.abs(target.x-x)+Math.abs(target.y-y);
    if(!u.range.includes(dd)) continue;
    const sc=TILE[tileChar(x,y)].avoid + TILE[tileChar(x,y)].def*10 - mr.get(k)*0.1;
    if(!best||sc>best.sc) best={x,y,sc};
  }
  return best;
}

function onTile(x,y){
  if(!B||B.busy||B.over||B.phase!=='P') return;
  const u=unitAt(x,y);
  B.tileSel={x,y};
  if(B.mode==='idle'){
    if(u&&u.team==='P'&&!u.acted) selectUnit(u);
    else if(u&&u.team==='E') inspectEnemy(u);
    else { B.inspect=null; B.mr=null; renderBattle(); }
  }
  else if(B.mode==='move'){
    const k=x+','+y;
    if(u===B.sel){ openMenu(); return; }
    if(u&&u.team==='E'){
      const pos=pickAttackPos(B.sel,u,B.mr);
      if(pos){ B.sel.x=pos.x; B.sel.y=pos.y; B.mode='menu'; renderBattle(); openForecast(B.sel,u,null); return; }
      clearSel(); inspectEnemy(u); return;
    }
    if(B.mr.has(k)&&stoppable(B.sel,x,y)){
      B.sel.x=x; B.sel.y=y; B.mode='menu'; renderBattle(); openMenu();
    } else clearSel();
  }
  else if(B.mode==='target-attack'||B.mode==='target-skill'){
    const skill=B.mode==='target-skill'?B.sel.skills[0]:null;
    if(u&&u.team==='E'&&B.targets.includes(u)) openForecast(B.sel,u,skill);
    else backToMenu();
  }
  else if(B.mode==='target-heal'){
    if(u&&u.team==='P'&&B.targets.includes(u)){
      const a=B.sel;
      hideMenu(); B.mode='idle';
      healAction(a,u).then(()=>{ finishUnit(a); });
    } else backToMenu();
  }
  else if(B.mode==='menu'){ backToMenu(); }
}
function backToMenu(){ B.mode='menu'; B.targets=null; renderBattle(); openMenu(); }

function finishUnit(u){
  u.acted=true; B.sel=null; B.orig=null; B.mode='idle'; B.mr=null; B.targets=null;
  hideMenu(); renderBattle();
  if(!B.over && players().every(p=>p.acted)) setTimeout(endPlayerPhase,400);
}

/* ── 액션 메뉴 ── */
function openMenu(){
  const u=B.sel; hideMenu();
  const enemiesNear=foes().filter(e=>u.range.includes(dist(u,e)));
  const sk=u.skills.length?SKILLS[u.skills[0]]:null;
  let html='';
  if(enemiesNear.length) html+=`<button class="btn" onclick="menuAct('attack')">공격</button>`;
  if(sk&&!sk.heal&&u.ki>=sk.cost&&enemiesNear.length) html+=`<button class="btn" onclick="menuAct('skill')">${sk.name} <span style="color:#6ab0ce;font-size:12px">기${sk.cost}</span></button>`;
  if(sk&&sk.heal&&u.ki>=sk.cost){
    const hurt=players().filter(p=>p!==u&&u.range.includes(dist(u,p))&&p.hp<p.maxhp);
    if(hurt.length) html+=`<button class="btn" onclick="menuAct('heal')">치료 <span style="color:#6ab0ce;font-size:12px">기${sk.cost}</span></button>`;
  }
  html+=`<button class="btn" onclick="menuAct('wait')">대기</button>`;
  html+=`<button class="btn" onclick="menuAct('cancel')">취소</button>`;
  const m=document.createElement('div');
  m.id='amenu'; m.innerHTML=html;
  const wrap=document.getElementById('mapwrap');
  let mx=(u.x+1)*TS+6, my=u.y*TS-10;
  if(mx>B.w*TS-165) mx=u.x*TS-160;
  my=Math.max(4,Math.min(my,B.h*TS-160));
  m.style.left=mx+'px'; m.style.top=my+'px';
  wrap.appendChild(m);
}
function hideMenu(){ const m=document.getElementById('amenu'); if(m) m.remove(); }
function menuAct(act){
  const u=B.sel;
  if(act==='cancel'){ clearSel(); return; }
  if(act==='wait'){ hideMenu(); finishUnit(u); return; }
  hideMenu();
  if(act==='attack'){ B.mode='target-attack'; B.targets=foes().filter(e=>u.range.includes(dist(u,e))); }
  if(act==='skill'){ B.mode='target-skill'; B.targets=foes().filter(e=>u.range.includes(dist(u,e))); }
  if(act==='heal'){ B.mode='target-heal'; B.targets=players().filter(p=>p!==u&&u.range.includes(dist(u,p))&&p.hp<p.maxhp); }
  renderBattle();
}

/* ── 전투 예측 ── */
function openForecast(a,d,skillId){
  const my=calcStrike(a,d,skillId);
  const counter=canCounter(d,a)?calcStrike(d,a,null):null;
  const sk=skillId?SKILLS[skillId]:null;
  const triTxt = my.tri>0?'<span style="color:#8fce6a">유리 ▲</span>':(my.tri<0?'<span style="color:#e07a5a">불리 ▼</span>':'—');
  const html=`
  <div class="modal-back" id="fc-modal">
    <div class="modal">
      <h3>전투 예측 ${sk?`— ${sk.name}`:''}</h3>
      <div class="fc-grid">
        <div class="hd">${a.name}</div><div class="lbl">상성 ${triTxt}</div><div class="hd">${d.name}</div>
        <div class="val">${a.hp} / ${a.maxhp}</div><div class="lbl">HP</div><div class="val">${d.hp} / ${d.maxhp}</div>
        <div class="val">${my.dmg}${my.dbl?' ×2':''}</div><div class="lbl">위력</div><div class="val">${counter?`${counter.dmg}${counter.dbl?' ×2':''}`:'반격 불가'}</div>
        <div class="val">${my.hit}%</div><div class="lbl">명중</div><div class="val">${counter?counter.hit+'%':'—'}</div>
        <div class="val">${my.crit}%</div><div class="lbl">필살</div><div class="val">${counter?counter.crit+'%':'—'}</div>
      </div>
      <div class="btnrow">
        <button class="btn" onclick="confirmAttack()">공격 개시</button>
        <button class="btn" onclick="cancelForecast()">취소</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  B.pending={a,d,skillId};
}
function cancelForecast(){
  const m=document.getElementById('fc-modal'); if(m) m.remove();
  B.pending=null; backToMenu();
}
function confirmAttack(){
  const m=document.getElementById('fc-modal'); if(m) m.remove();
  const p=B.pending; B.pending=null;
  hideMenu(); B.mode='idle'; B.targets=null;
  combat(p.a,p.d,p.skillId).then(()=>{ if(!B.over) finishUnit(p.a); });
}

/* ── 턴 진행 ── */
async function startPlayerPhase(first){
  if(B.over) return;
  if(!first) B.turn++;
  B.phase='P';
  for(const u of B.units.filter(u=>u.alive)) u.acted=false;
  for(const p of players()){
    p.ki=Math.min(p.maxki,p.ki+4);
    const t=TILE[tileChar(p.x,p.y)];
    if(t.heal&&p.hp<p.maxhp){
      const amt=Math.ceil(p.maxhp*t.heal);
      p.hp=Math.min(p.maxhp,p.hp+amt);
      fx(p.x,p.y,'+'+amt,'heal');
    }
  }
  renderBattle();
  await banner(`아군 페이즈 — ${B.turn}턴`);
  B.busy=false;
}
function endPlayerPhase(){
  if(!B||B.over||B.phase!=='P'||B.busy) return;
  clearSelHard();
  enemyPhase();
}
function clearSelHard(){ B.sel=null; B.orig=null; B.mode='idle'; B.mr=null; B.targets=null; B.inspect=null; hideMenu(); }

async function enemyPhase(){
  B.phase='E'; B.busy=true;
  renderBattle();
  await banner('적군 페이즈',true);
  for(const e of foes()) e.ki=Math.min(e.maxki,e.ki+4);
  const list=B.units.filter(u=>u.team==='E');
  for(const u of list){
    if(B.over) return;
    if(!u.alive) continue;
    if(u.wait){
      const near=players().some(p=>dist(p,u)<=u.wait);
      if(!near && u.hp===u.maxhp) continue;
      u.wait=0;
    }
    const mr=moveRange(u);
    let best=null;
    for(const k of mr.keys()){
      const [x,y]=k.split(',').map(Number);
      if(!stoppable(u,x,y)) continue;
      for(const p of players()){
        const dd=Math.abs(p.x-x)+Math.abs(p.y-y);
        if(!u.range.includes(dd)) continue;
        const useSkill=u.skills.length&&!SKILLS[u.skills[0]].heal&&u.ki>=SKILLS[u.skills[0]].cost;
        const pv=calcStrike(u,p,useSkill?u.skills[0]:null);
        let score=pv.dmg*(pv.hit/100)+(pv.dmg>=p.hp?60:0)+TILE[tileChar(x,y)].avoid*0.2+(p.leader?6:0);
        if(p.range.includes(dd)){
          const c=calcStrike(p,u,null);
          score-=c.dmg*(c.hit/100)*0.5;
        }
        if(!best||score>best.score) best={x,y,p,score,useSkill};
      }
    }
    if(best){
      if(best.x!==u.x||best.y!==u.y){ u.x=best.x; u.y=best.y; renderBattle(true); await sleep(300); }
      await combat(u,best.p,best.useSkill?u.skills[0]:null);
      if(B.over) return;
    }else{
      let tgt=null;
      for(const p of players()) if(!tgt||dist(p,u)<dist(tgt,u)) tgt=p;
      if(tgt){
        let bt=null;
        for(const k of mr.keys()){
          const [x,y]=k.split(',').map(Number);
          if(!stoppable(u,x,y)) continue;
          const dd=Math.abs(tgt.x-x)+Math.abs(tgt.y-y);
          if(!bt||dd<bt.dd) bt={x,y,dd};
        }
        if(bt&&(bt.x!==u.x||bt.y!==u.y)){ u.x=bt.x; u.y=bt.y; renderBattle(true); await sleep(220); }
      }
    }
  }
  if(!B.over) startPlayerPhase(false);
}

/* ── 전투 시작 ── */
function startBattle(){
  const ch=CHAPTERS[G.chapterIdx];
  const map=ch.map.map(r=>{
    let s=r;
    while(s.length<14) s+='.';
    return s.slice(0,14);
  });
  B={
    map, w:14, h:map.length,
    units:[], turn:1, phase:'P', mode:'idle',
    sel:null, orig:null, mr:null, targets:null, inspect:null, tileSel:null,
    busy:true, over:false, log:[], pending:null,
  };
  G.party.forEach((cid,i)=>{
    if(i<ch.spawns.length){
      const [x,y]=ch.spawns[i];
      B.units.push(mkPlayerUnit(cid,x,y));
    }
  });
  for(const def of ch.enemies) B.units.push(mkEnemyUnit(def));
  renderScreenBattle();
  log(`<b>${ch.title}</b> — 승리 조건: ${ch.win.text}`,true);
  startPlayerPhase(true);
}
/* ============================================================
   렌더링 · 화면 흐름
   ============================================================ */

/* ── 전투 화면 골격 ── */
function renderScreenBattle(){
  app().innerHTML=`
  <div id="battle">
    <div id="mapwrap" style="width:${14*TS}px;height:${CHAPTERS[G.chapterIdx].map.length*TS}px">
      <svg id="mapsvg" width="${14*TS}" height="${CHAPTERS[G.chapterIdx].map.length*TS}"></svg>
      <div id="fx"></div>
      <div id="banner"></div>
    </div>
    <div id="side"></div>
  </div>`;
  const wrap=document.getElementById('mapwrap');
  wrap.addEventListener('click',e=>{
    if(e.target.closest('#amenu')) return;
    const svg=document.getElementById('mapsvg');
    const r=svg.getBoundingClientRect();
    const x=Math.floor((e.clientX-r.left)/TS), y=Math.floor((e.clientY-r.top)/TS);
    if(inb(x,y)) onTile(x,y);
  });
  wrap.addEventListener('contextmenu',e=>{
    e.preventDefault();
    if(!B.busy&&B.mode!=='idle'){ if(B.mode==='menu'||B.mode.startsWith('target')) clearSel(); else clearSel(); }
    else if(B.inspect){ B.inspect=null; B.mr=null; renderBattle(); }
  });
  renderBattle();
}

/* ── 전투 렌더 (svg + 사이드) ── */
function renderBattle(light){
  if(!B) return;
  const svg=document.getElementById('mapsvg');
  if(!svg) return;
  let s='';
  for(let y=0;y<B.h;y++) for(let x=0;x<B.w;x++) s+=tileSVG(tileChar(x,y),x,y);

  /* 하이라이트 */
  const hl=[];
  if(B.mode==='move'&&B.mr&&B.sel){
    const atk=attackTiles(B.sel,B.mr);
    for(const k of atk){ if(!B.mr.has(k)) hl.push([k,'rgba(200,70,50,.4)']); }
    for(const k of B.mr.keys()){
      const [x,y]=k.split(',').map(Number);
      if(stoppable(B.sel,x,y)) hl.push([k,'rgba(70,130,200,.45)']);
    }
  }
  if(B.inspect&&B.mr){
    const atk=attackTiles(B.inspect,B.mr);
    for(const k of atk) hl.push([k,'rgba(220,140,40,.28)']);
    for(const k of B.mr.keys()) hl.push([k,'rgba(220,140,40,.42)']);
  }
  if(B.targets){
    const col=B.mode==='target-heal'?'rgba(90,190,90,.5)':'rgba(220,60,40,.5)';
    for(const t of B.targets) hl.push([t.x+','+t.y,col]);
  }
  for(const [k,c] of hl){
    const [x,y]=k.split(',').map(Number);
    s+=`<rect x="${x*TS+2}" y="${y*TS+2}" width="${TS-4}" height="${TS-4}" rx="6" fill="${c}" stroke="rgba(255,255,255,.25)"/>`;
  }
  if(B.tileSel&&!B.busy){
    s+=`<rect x="${B.tileSel.x*TS+1.5}" y="${B.tileSel.y*TS+1.5}" width="${TS-3}" height="${TS-3}" rx="4" fill="none" stroke="#f0d49a" stroke-width="2"/>`;
  }
  /* 유닛 (선택 유닛은 맨 위에) */
  for(const u of B.units.filter(u=>u.alive&&u!==B.sel)) s+=unitSVG(u);
  if(B.sel&&B.sel.alive) s+=unitSVG(B.sel);
  svg.innerHTML=s;
  renderSide();
}

function statRow(lbl,val){ return `<div>${lbl} <b>${val}</b></div>`; }
function renderSide(){
  const side=document.getElementById('side');
  if(!side) return;
  const ch=CHAPTERS[G.chapterIdx];
  const u=B.sel||B.inspect||(B.tileSel?unitAt(B.tileSel.x,B.tileSel.y):null);
  let card='<div style="color:var(--dim);padding:14px 4px;text-align:center;">유닛을 선택하세요</div>';
  if(u){
    const sk=u.skills.length?SKILLS[u.skills[0]]:null;
    const hpPct=Math.round(u.hp/u.maxhp*100), kiPct=Math.round(u.ki/u.maxki*100);
    card=`
    <div class="uc-head">
      <div class="uc-pt ${u.team==='E'?'enemy':''}">${ptSVG(u.cid)}</div>
      <div style="flex:1">
        <div class="uc-name">${u.name}${u.boss?' ★':''}<span class="typebadge type-${u.type}">${TYPE_NAME[u.type]}</span></div>
        <div class="uc-sub">${u.cls} · Lv.${u.lvl}${u.team==='P'?` · EXP ${u.exp}`:''}</div>
        <div class="bar hp ${hpPct<=35?'low':''}"><i style="width:${hpPct}%"></i></div>
        <div class="uc-sub" style="display:flex;justify-content:space-between"><span>HP ${u.hp}/${u.maxhp}</span><span>기 ${u.ki}/${u.maxki}</span></div>
        <div class="bar ki"><i style="width:${kiPct}%"></i></div>
      </div>
    </div>
    <div class="uc-stats">
      ${statRow('힘',u.stats.str)}${statRow('내공',u.stats.int)}${statRow('기술',u.stats.skl)}
      ${statRow('방어',u.stats.def)}${statRow('정신',u.stats.res)}${statRow('속도',u.stats.spd)}
      ${statRow('이동',u.stats.mov)}${statRow('사거리',u.range.join('·'))}<div></div>
    </div>
    ${sk?`<div class="uc-skill">◆ ${sk.name} — ${sk.desc} (기 ${sk.cost})</div>`:''}`;
  }
  let terr='';
  if(B.tileSel){
    const T=TILE[tileChar(B.tileSel.x,B.tileSel.y)];
    terr=`지형: <b>${T.name}</b> — 회피 +${T.avoid} · 방어 +${T.def}${T.heal?' · 매턴 HP 회복':''}`;
  }
  side.innerHTML=`
  <div class="panel" id="chinfo">
    <div class="ch-t">${ch.title}</div>
    <div class="row"><span>턴</span><b>${B.turn}</b></div>
    <div class="row"><span>페이즈</span><b>${B.phase==='P'?'아군':'적군'}</b></div>
    <div class="row"><span>승리</span><b>${ch.win.text}</b></div>
    <div class="row"><span>패배</span><b>${ch.lose}</b></div>
    <div class="row"><span>병력</span><b>아군 ${players().length} · 적 ${foes().length}</b></div>
  </div>
  <div class="panel" id="unitcard">${card}</div>
  <div class="panel" id="terrinfo">${terr||'타일을 클릭하면 지형 정보가 표시됩니다'}</div>
  <div id="sidebtns">
    <button class="btn small" onclick="endPlayerPhase()" ${B.phase!=='P'||B.busy?'disabled':''}>턴 종료</button>
    <button class="btn small" onclick="showHelp()">도움말</button>
    <button class="btn small danger" onclick="confirmToTitle()">타이틀로</button>
  </div>
  <div class="panel"><div id="log">${B.log.map(l=>`<div class="${l.imp?'imp':''}">${l.msg}</div>`).join('')}</div></div>`;
}

/* ── 대화 화면 ── */
function dlgBgSVG(){
  return `<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs><linearGradient id="dsky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#2a2440"/><stop offset=".6" stop-color="#4a3a50"/><stop offset="1" stop-color="#8a6248"/>
  </linearGradient></defs>
  <rect width="1000" height="600" fill="url(#dsky)"/>
  <circle cx="780" cy="110" r="55" fill="#f0e0b8" opacity=".75"/>
  <path d="M0,430 L160,300 L300,410 L430,280 L580,440 L1000,420 L1000,600 L0,600 Z" fill="#332a44" opacity=".9"/>
  <path d="M300,470 L520,340 L700,460 L850,380 L1000,470 L1000,600 L300,600 Z" fill="#241e30"/>
  <path d="M0,500 Q500,470 1000,505 L1000,600 L0,600 Z" fill="#171220"/>
  <g stroke="#171220" stroke-width="3" opacity=".7">
    <path d="M120,470 q0,-45 6,-60 M126,410 q-14,10 -24,8 M126,410 q12,8 22,6" fill="none"/>
    <ellipse cx="126" cy="398" rx="16" ry="10" fill="#243020" stroke="none"/>
  </g>
  </svg>`;
}
let DLG=null;
function showDialogue(lines, done, titleCard){
  DLG={lines, idx:-1, done, titleCard, lastL:null, lastR:null};
  app().innerHTML=`<div id="dlg-screen">
    <div id="dlg-bg">${dlgBgSVG()}</div>
    <div id="dlg-ptL"></div><div id="dlg-ptR"></div>
    <div id="dlg-box"><div id="dlg-name"></div><div id="dlg-text"></div></div>
    <div id="dlg-hint">클릭하여 진행 ▼</div>
    ${titleCard?`<div class="dlg-title-card" id="dlg-tc"><h2>${titleCard}</h2><p>클릭하여 시작</p></div>`:''}
  </div>`;
  const scr=document.getElementById('dlg-screen');
  scr.addEventListener('click',advanceDlg);
  if(!titleCard) advanceDlg();
}
function advanceDlg(){
  const tc=document.getElementById('dlg-tc');
  if(tc){ tc.remove(); if(DLG.idx===-1){ DLG.idx=0; showDlgLine(); } return; }
  DLG.idx++;
  if(DLG.idx>=DLG.lines.length){ const d=DLG.done; DLG=null; d(); return; }
  showDlgLine();
}
function showDlgLine(){
  const L=DLG.lines[DLG.idx];
  const nameEl=document.getElementById('dlg-name'), textEl=document.getElementById('dlg-text');
  const pL=document.getElementById('dlg-ptL'), pR=document.getElementById('dlg-ptR');
  if(L.s===null){
    nameEl.textContent='— 나레이션 —'; nameEl.className='';
    textEl.innerHTML=`<i style="color:#cfc2a8">${L.t}</i>`;
  }else{
    const c=CHARS[L.s];
    const isEnemy=['mcp','jhp','dj','msa','gs','hth','yjs','yjo','plh','stc','ygang','sab','ogg','oyb'].includes(L.s);
    nameEl.textContent=c.name+' 「'+c.cls+'」'; nameEl.className=isEnemy?'enemy':'';
    textEl.textContent=L.t;
    if(L.side==='L'){ DLG.lastL=L.s; } else { DLG.lastR=L.s; }
  }
  pL.innerHTML=DLG.lastL?`<div class="dlg-pt L ${L.s!==DLG.lastL||L.s===null?'dimmed':''}">${ptSVG(DLG.lastL)}</div>`:'';
  pR.innerHTML=DLG.lastR?`<div class="dlg-pt R ${L.s!==DLG.lastR||L.s===null?'dimmed':''}">${ptSVG(DLG.lastR)}</div>`:'';
}

/* ── 챕터 진행 ── */
function startChapter(idx, skipPre){
  G.chapterIdx=idx;
  const ch=CHAPTERS[idx];
  for(const cid of ch.joins) initRosterChar(cid);
  G.snapshot=deepClone({roster:G.roster, party:G.party});
  if(skipPre) startBattle();
  else showDialogue(ch.pre, startBattle, ch.title);
}
function applyRoster(){
  for(const u of B.units.filter(u=>u.team==='P')){
    const r=G.roster[u.cid];
    r.lvl=u.lvl; r.exp=u.exp; r.stats=deepClone(u.stats);
  }
}
function showVictory(){
  const ch=CHAPTERS[G.chapterIdx];
  applyRoster();
  const next=G.chapterIdx+1;
  saveGame(next);
  app().innerHTML=`<div class="result-screen">
    <h2 style="color:#ffd94a">勝 利</h2>
    <p>${ch.title} — 클리어!<br>부상당한 동료들도 무사히 회복했습니다.</p>
    <button class="btn" onclick="afterVictory(${next})">계속</button>
  </div>`;
}
function afterVictory(next){
  const ch=CHAPTERS[G.chapterIdx];
  showDialogue(ch.post, ()=>{
    if(next>=CHAPTERS.length) showEnding();
    else startChapter(next);
  });
}
function showDefeat(){
  app().innerHTML=`<div class="result-screen">
    <h2 style="color:#e07a5a">敗 北</h2>
    <p>곽정이 쓰러졌다… 강호의 이야기는 여기서 끝나지 않는다.</p>
    <button class="btn" onclick="retryChapter()">이 챕터 재도전</button>
    <button class="btn danger" onclick="toTitle()">타이틀로</button>
  </div>`;
}
function retryChapter(){
  const s=deepClone(G.snapshot);
  G.roster=s.roster; G.party=s.party;
  startChapter(G.chapterIdx, true);
}
function showEnding(){
  app().innerHTML=`<div class="result-screen">
    <h2>終 幕</h2>
    <p>${ENDING.join('<br>')}</p>
    <button class="btn" onclick="toTitle()">타이틀로</button>
  </div>`;
}

/* ── 저장/불러오기 ── */
const SAVE_KEY='kimyong_srpg_save_v1';
function saveGame(nextCh){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({ch:nextCh, roster:G.roster, party:G.party}));
  }catch(e){}
}
function loadGame(){
  try{
    const s=localStorage.getItem(SAVE_KEY);
    return s?JSON.parse(s):null;
  }catch(e){ return null; }
}
function continueGame(){
  const s=loadGame();
  if(!s) return;
  if(s.ch>=CHAPTERS.length){ toTitle(); return; }
  G.roster=s.roster; G.party=s.party;
  startChapter(s.ch);
}

/* ── 타이틀 ── */
function toTitle(){ B=null; showTitle(); }
function confirmToTitle(){ if(confirm('전투를 포기하고 타이틀로 돌아갈까요? (진행 상황은 챕터 시작 시점으로 돌아갑니다)')) toTitle(); }
function showTitle(){
  const hasSave=!!loadGame();
  app().innerHTML=`<div id="title-screen">
    ${titleArtSVG()}
    <div class="title-main">사조영웅전<span style="font-size:24px;color:var(--dim)"> ─ </span>강호의 별</div>
    <div class="title-sub">射鵰英雄傳 · 김용 무협 시뮬레이션 RPG</div>
    <div class="title-menu">
      <div><button class="btn" onclick="newGame()">새로운 협객행 (새 게임)</button></div>
      <div><button class="btn" onclick="continueGame()" ${hasSave?'':'disabled'}>이어하기</button></div>
      <div><button class="btn" onclick="showHelp()">유파 안내 (도움말)</button></div>
    </div>
    <div class="title-note">
      본 게임은 AI(Claude)가 제작한 김용(金庸) 원작 팬메이드 데모입니다.<br>
      데모 범위: 사조영웅전 4개 챕터 + 크로스오버 게스트(천룡팔부·신조협려) 참전
    </div>
  </div>`;
}
function newGame(){
  G.chapterIdx=0; G.roster={}; G.party=[];
  startChapter(0);
}

/* ── 도움말 ── */
function showHelp(){
  const html=`
  <div class="modal-back" id="help-modal" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <h3>강호 지침 (도움말)</h3>
      <p style="font-size:13.5px;line-height:1.8;color:var(--dim)">
      아군 유닛 클릭 → 이동할 칸 클릭 → 행동 선택(공격/무공/치료/대기).<br>
      이동 중 <b style="color:var(--text)">적을 바로 클릭</b>하면 자동으로 접근해 공격합니다.<br>
      우클릭/취소로 행동을 무를 수 있습니다(행동 확정 전까지).</p>
      <table class="helptable">
        <tr><th colspan="3">무공 상성 (유리한 쪽 +피해 +명중)</th></tr>
        <tr><td><span class="typebadge type-외">외공</span> ▶ <span class="typebadge type-경">경공</span></td>
            <td><span class="typebadge type-경">경공</span> ▶ <span class="typebadge type-내">내공</span></td>
            <td><span class="typebadge type-내">내공</span> ▶ <span class="typebadge type-외">외공</span></td></tr>
      </table>
      <table class="helptable">
        <tr><th>지형</th><th>회피</th><th>방어</th><th>비고</th></tr>
        <tr><td>숲</td><td>+20</td><td>+1</td><td>이동비용 2</td></tr>
        <tr><td>산</td><td>+30</td><td>+2</td><td>이동비용 3</td></tr>
        <tr><td>가옥</td><td>+10</td><td>+2</td><td>매턴 HP 15% 회복</td></tr>
        <tr><td>물·담장</td><td>—</td><td>—</td><td>진입 불가</td></tr>
      </table>
      <p style="font-size:13.5px;line-height:1.8;color:var(--dim)">
      ◆ <b style="color:var(--text)">경공</b> 유닛은 험지(숲/산) 이동비용 -1<br>
      ◆ <b style="color:var(--text)">무공(스킬)</b>은 기(氣)를 소모하며, 기는 매턴 4씩 회복<br>
      ◆ 속도가 4 이상 높으면 <b style="color:var(--text)">2회 공격</b> (무공 사용 시 제외)<br>
      ◆ 쓰러진 아군은 <b style="color:var(--text)">부상 이탈</b> — 다음 챕터에 복귀 (곽정이 쓰러지면 패배)<br>
      ◆ 진행 상황은 챕터 클리어 시 자동 저장</p>
      <div class="btnrow"><button class="btn" onclick="document.getElementById('help-modal').remove()">닫기</button></div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

/* ── 부팅 ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const fm=document.getElementById('fc-modal');
    if(fm){ cancelForecast(); return; }
    const hm=document.getElementById('help-modal');
    if(hm){ hm.remove(); return; }
    if(B&&!B.busy&&B.mode!=='idle') clearSel();
  }
});
window.addEventListener('DOMContentLoaded',()=>{
  buildPortraitDefs();
  showTitle();
});
</script>
</body>
</html>
